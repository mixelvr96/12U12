<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>12 UNDER 12 — Coming soon</title>
  <style>
    html, body {
      margin: 0;
      background: #70020f;
    }

    body {
      overflow-x: hidden;
    }

    main {
      margin: 0;
      padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      box-sizing: border-box;
    }

    .coming-soon-wrap {
      position: relative;
      width: fit-content;
      max-width: min(100vw, 2800px);
      margin-left: auto;
      margin-right: auto;
    }

    .coming-soon-art {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      max-height: min(
        calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)),
        1800px
      );
      margin: 0 auto;
    }

    .newsletter-seal {
      position: absolute;
      left: 50%;
      bottom: 14%;
      width: 14%;
      max-width: 200px;
      aspect-ratio: 1;
      transform: translate(-50%, -6px);
      border-radius: 50%;
      box-sizing: border-box;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(250, 243, 234, 0.15);
    }

    .newsletter-seal:hover {
      background: rgba(250, 243, 234, 0.06);
    }

    .newsletter-seal:focus {
      outline: none;
    }

    .newsletter-seal:focus-visible {
      outline: 3px solid rgba(250, 243, 234, 0.95);
      outline-offset: 3px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="visually-hidden">Zorka.Agency × Influencer Marketing Hub — coming soon. Stay tuned.</h1>
    <div class="coming-soon-wrap">
      <img
        class="coming-soon-art"
        src="images/12u12.webp?v=disk-webp-3"
        alt="Zorka.Agency × Influencer Marketing Hub. Coming soon. Stay tuned. Join our newsletter on the wax seal."
        width="10667"
        height="6000"
      >
      <a
        class="newsletter-seal"
        href="mailto:info@zorka.agency?subject=12%20UNDER%2012%20%E2%80%94%20Newsletter&amp;body=Please%20subscribe%20me%20to%20the%20email%20newsletter.%0A%0AMy%20email%3A%20"
        title="Subscribe — info@zorka.agency"
        aria-label="Join our newsletter: send an email to info@zorka.agency to subscribe"
      >
        <span class="visually-hidden">Join our newsletter — info@zorka.agency</span>
      </a>
    </div>
  </main>
</body>
</html>
